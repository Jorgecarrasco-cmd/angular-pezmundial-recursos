<div class="drawer lg:drawer-open">
  <input id="my-drawer-4" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content">
    <!-- Navbar -->
    <nav class="navbar w-full bg-base-300 shadow-sm">
      @if (authService.isAuthenticated()) {
        <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost">
          <i class="fa-solid fa-bars"></i>
        </label>
      }

      <div class="flex flex-1 justify-between items-center px-4">
        <img src="assets/logo-horizontal.svg" class="h-8" />
        @if (authService.isAuthenticated()) {
          <app-user-avatar [name]="userName()" [lastname]="lastname()"></app-user-avatar>
        }
      </div>
    </nav>
    <!-- Page content here -->
    <div class="p-6">
      <router-outlet></router-outlet>
    </div>

    <app-footer></app-footer>
  </div>

  @if (authService.isAuthenticated()) {
    <div class="drawer-side is-drawer-close:overflow-visible">
      <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
      <div class="flex min-h-full flex-col bg-base-200 is-drawer-close:w-14 is-drawer-open:w-64">
        <!-- Logo -->
        <div class="flex items-center justify-center py-6 is-drawer-close:py-4">
          <img
            src="assets/sello-mision.svg"
            class="is-drawer-close:w-8 is-drawer-open:w-20 transition-all duration-300"
          />
        </div>

        <!-- Divider -->
        <div class="is-drawer-close:hidden divider mx-4 my-0"></div>

        <!-- Menu -->
        <ul class="menu w-full pt-4 gap-2">
          <!-- Inicio -->
          <li>
            <button
              routerLink="/"
              routerLinkActive="nav-active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="is-drawer-close:tooltip is-drawer-close:tooltip-right is-drawer-close:justify-center py-3"
              data-tip="Inicio"
            >
              <i class="fas fa-home text-lg"></i>
              <span class="is-drawer-close:hidden font-semibold text-base">Inicio</span>
            </button>
          </li>

          <!-- Calendario -->
          <li>
            <button
              routerLink="/calendar"
              routerLinkActive="nav-active"
              class="is-drawer-close:tooltip is-drawer-close:tooltip-right is-drawer-close:justify-center py-3"
              data-tip="Calendario"
            >
              <i class="fas fa-calendar text-lg"></i>
              <span class="is-drawer-close:hidden font-semibold text-base">Calendario</span>
            </button>
          </li>

          <!-- Administración -->
          <li>
            <details [open]="isAdminRoute()">
              <summary
                routerLinkActive="nav-active"
                routerLink="/admin"
                class="is-drawer-close:tooltip is-drawer-close:tooltip-right is-drawer-close:justify-center py-3"
                data-tip="Administración"
              >
                <i class="fas fa-shield-halved text-lg"></i>
                <span class="is-drawer-close:hidden font-semibold text-base">Administración</span>
              </summary>

              <ul class="mt-3">
                <li>
                  <button
                    routerLink="/admin/add-resource"
                    routerLinkActive="nav-active"
                    class="py-2 text-sm"
                  >
                    <i class="fa-solid fa-file-circle-plus"></i>
                    <span class="is-drawer-close:hidden">Agregar Recurso</span>
                  </button>
                </li>
                <li>
                  <button
                    routerLink="/admin/add-author"
                    routerLinkActive="nav-active"
                    class="py-2 text-sm"
                  >
                    <i class="fa-solid fa-person"></i>
                    <span class="is-drawer-close:hidden">Agregar Autor</span>
                  </button>
                </li>
                <li>
                  <button
                    routerLink="/admin/add-tag"
                    routerLinkActive="nav-active"
                    class="py-2 text-sm"
                  >
                    <i class="fa-solid fa-tag"></i>
                    <span class="is-drawer-close:hidden">Agregar Etiqueta</span>
                  </button>
                </li>
                <li>
                  <button
                    routerLink="/admin/add-serie"
                    routerLinkActive="nav-active"
                    class="py-2 text-sm"
                  >
                    <i class="fa-solid fa-table-list"></i>
                    <span class="is-drawer-close:hidden">Agregar Serie</span>
                  </button>
                </li>
              </ul>
            </details>
          </li>

          <!-- Usuarios -->
          <li>
            <button
              routerLink="/users"
              routerLinkActive="nav-active"
              class="is-drawer-close:tooltip is-drawer-close:tooltip-right is-drawer-close:justify-center py-3"
              data-tip="Usuarios"
            >
              <i class="fas fa-users text-lg"></i>
              <span class="is-drawer-close:hidden font-semibold text-base">Usuarios</span>
            </button>
          </li>

          <!-- Cerrar Sesión -->
          <li>
            <button
              (click)="authService.logout()"
              class="is-drawer-close:tooltip is-drawer-close:tooltip-right is-drawer-close:justify-center py-3"
              data-tip="Cerrar Sesion"
            >
              <i class="fas fa-arrow-right-from-bracket"></i>
              <span class="is-drawer-close:hidden font-semibold text-base">Cerrar Sesion</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  }
</div>
